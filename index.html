<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlashRide — Before & After Analysis Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
<style>
:root{--green-dark:#1a4731;--green-mid:#2d6a4f;--green-main:#40916c;--green-light:#74c69d;--green-pale:#d8f3dc;--green-faint:#f0faf3;--white:#ffffff;--off-white:#f7fdf9;--text-dark:#1a2e22;--text-mid:#374a3e;--text-light:#6b8577;--border:#b7e4c7;--red:#c0392b;--red-soft:#ffe8e8;--red-bar:#e8b4b4;--amber:#e67e22;--gray:#888888;--lgray:#bbbbbb;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--text-dark);line-height:1.7}
.site-header{background:var(--green-dark);padding:36px 48px 32px;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:rgba(116,198,157,0.08)}
.header-tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--green-light);background:rgba(116,198,157,0.12);border:1px solid rgba(116,198,157,0.25);padding:4px 14px;border-radius:20px;margin-bottom:14px}
.site-header h1{font-family:'DM Serif Display',serif;font-size:38px;font-weight:400;color:var(--white);line-height:1.2;margin-bottom:10px}
.site-header h1 em{font-style:italic;color:var(--green-light)}
.site-header p{font-size:15px;color:rgba(255,255,255,0.65);font-weight:300;max-width:700px}
.header-meta{margin-top:20px;display:flex;gap:24px;flex-wrap:wrap}
.header-meta span{font-size:12px;color:rgba(255,255,255,0.45)}
.header-meta strong{color:rgba(255,255,255,0.7)}
.story-nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 48px;display:flex;position:sticky;top:0;z-index:100;overflow-x:auto}
.story-nav a{padding:14px 20px;font-size:13px;font-weight:500;color:var(--text-light);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.story-nav a:hover{color:var(--green-main)}
.story-nav a.active{color:var(--green-dark);border-bottom-color:var(--green-main)}
.main{max-width:1200px;margin:0 auto;padding:40px 24px 80px}
.story-section{margin-bottom:64px}
.story-section+.story-section{border-top:1px solid var(--border);padding-top:56px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--green-main);margin-bottom:8px}
.section-title{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:var(--text-dark);margin-bottom:6px;line-height:1.3}
.section-desc{font-size:14px;color:var(--text-light);margin-bottom:28px;max-width:700px}
.narrative{background:var(--green-faint);border-left:3px solid var(--green-main);border-radius:0 var(--radius) var(--radius) 0;padding:18px 22px;font-size:14px;color:var(--text-mid);margin-bottom:28px;line-height:1.8}
.narrative strong{color:var(--green-dark)}
/* KPI CARDS */
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.kpi-ba-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 18px;position:relative;overflow:hidden}
.kpi-ba-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.kpi-ba-card.k1::before{background:var(--red)}
.kpi-ba-card.k2::before{background:var(--green-main)}
.kpi-ba-card.k3::before{background:var(--amber)}
.kpi-ba-num{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-light);margin-bottom:4px}
.kpi-ba-name{font-size:14px;font-weight:600;color:var(--text-dark);margin-bottom:12px}
.kpi-ba-formula{font-size:10px;color:var(--text-light);font-style:italic;background:var(--green-faint);border-radius:6px;padding:7px 10px;margin-bottom:14px;line-height:1.5}
.kpi-ba-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.kpi-ba-col{flex:1}
.kpi-ba-col-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.col-before .kpi-ba-col-label{color:var(--red)}
.col-after .kpi-ba-col-label{color:var(--green-dark)}
.kpi-ba-val{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}
.col-before .kpi-ba-val{color:var(--red)}
.col-after .kpi-ba-val{color:var(--green-dark)}
.kpi-ba-unit{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--text-light);margin-left:2px}
.kpi-arrow{font-size:20px;color:var(--green-main);align-self:center}
.kpi-ba-change{margin-top:12px;background:var(--green-pale);border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--green-dark)}
.kpi-ba-change.warn{background:#fff3e0;color:#8a4a00}
.kpi-ba-change.bad{background:var(--red-soft);color:var(--red)}
/* ORIGINAL CARDS */
.kpi-compare{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green-main)}
.kpi-label{font-size:11px;color:var(--text-light);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-before{font-size:12px;color:var(--red);font-weight:500;margin-bottom:6px;padding:3px 8px;background:var(--red-soft);border-radius:4px;display:inline-block}
.kpi-after{font-size:22px;font-weight:700;color:var(--green-dark);font-family:'DM Serif Display',serif;margin-top:6px}
.kpi-change{font-size:11px;color:var(--green-main);margin-top:4px;font-weight:600}
/* CHARTS */
.chart-pair{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.chart-single{margin-bottom:28px}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
.chart-card-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.tag-before{background:var(--red-soft);color:var(--red);border:1px solid #f5c6c6}
.tag-after{background:var(--green-pale);color:var(--green-dark);border:1px solid var(--border)}
.chart-card-title{font-size:13px;font-weight:600;color:var(--text-dark);margin-bottom:3px}
.chart-card-sub{font-size:11px;color:var(--text-light);margin-bottom:14px}
.insight-text{font-size:12px;color:var(--text-mid);line-height:1.7;background:var(--green-faint);border-radius:var(--radius-sm);padding:10px 14px;margin-top:12px;border-left:2px solid var(--green-main)}
.chart-legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-light)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.process-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:28px}
.process-table th{text-align:left;padding:10px 14px;background:var(--green-dark);color:var(--white);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.process-table th:first-child{border-radius:var(--radius-sm) 0 0 0}
.process-table th:last-child{border-radius:0 var(--radius-sm) 0 0}
.process-table td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text-mid);vertical-align:top}
.process-table tr:last-child td{border-bottom:none}
.process-table tr:nth-child(even) td{background:var(--green-faint)}
.before-cell{color:var(--red);font-weight:500}
.after-cell{color:var(--green-dark);font-weight:500}
.conclusion{background:var(--green-dark);border-radius:var(--radius);padding:36px 40px;color:var(--white)}
.conclusion h3{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;margin-bottom:14px}
.conclusion p{font-size:14px;color:rgba(255,255,255,0.75);line-height:1.8;margin-bottom:12px}
.conclusion-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
.conclusion-stat{background:rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:16px}
.conclusion-stat .val{font-family:'DM Serif Display',serif;font-size:26px;color:var(--green-light)}
.conclusion-stat .lbl{font-size:12px;color:rgba(255,255,255,0.55);margin-top:4px}
.footer{background:var(--green-dark);color:rgba(255,255,255,0.4);text-align:center;padding:20px;font-size:12px}
</style>
</head>
<body>
<div class="site-header">
  <div class="header-tag">Before and After Analysis</div>
  <h1>FlashRide: From <em>Chaos</em> to Control</h1>
  <p>A data storytelling dashboard showing exactly how FlashRide's key metrics changed — every chart shows the before state and the after state side by side so the improvement is clear and measurable.</p>
  <div class="header-meta">
    <span><strong>Dataset:</strong> 1,500 operational records — January 2026</span>
    <span><strong>Fleet:</strong> 5,000 vehicles across 15 zones</span>
    <span><strong>Course:</strong> Information Systems — Dr. Tatiana Cardona, SLU</span>
  </div>
</div>
<nav class="story-nav">
  <a href="#kpis" class="active">KPIs</a>
  <a href="#problem">The Problem</a>
  <a href="#battery">Battery Downtime</a>
  <a href="#gps">GPS &amp; Ghost Vehicles</a>
  <a href="#satisfaction">Customer Satisfaction</a>
  <a href="#zones">Zone Distribution</a>
  <a href="#process">Process Comparison</a>
  <a href="#conclusion">Conclusion</a>
</nav>
<div class="main">

<!-- KPI SECTION -->
<div class="story-section" id="kpis">
  <div class="section-label">Key Performance Indicators — Before &amp; After</div>
  <div class="section-title">The 3 KPIs That Measure FlashRide's Success</div>
  <div class="section-desc">Each KPI is defined by a formula applied directly to dataset columns. The Before value is computed from the AS-IS state. The After value shows the projected improvement once the Unified Fleet Management Platform is deployed.</div>
  <div class="narrative">These three KPIs were derived directly from the dataset columns: <strong>Vehicle_Status</strong> and <strong>Battery_Pct_Before_Service</strong> for KPI 1 &mdash; <strong>Technician_Search_Time</strong> for KPI 2 &mdash; <strong>Customer_Rating</strong> for KPI 3. Every number below comes from the 1,500-row synthetic dataset.</div>
  <div class="kpi-strip">
    <div class="kpi-ba-card k1">
      <div class="kpi-ba-num">KPI 1</div>
      <div class="kpi-ba-name">Fleet Availability Rate (FAR)</div>
      <div class="kpi-ba-formula">FAR = Va / Vt &times; 100<br>Va = rows where Vehicle_Status = &lsquo;Available&rsquo; AND Battery_Pct_Before_Service &ge; 20<br>Vt = total vehicle records in dataset</div>
      <div class="kpi-ba-row">
        <div class="kpi-ba-col col-before"><div class="kpi-ba-col-label">Before (AS-IS)</div><div class="kpi-ba-val">28.1<span class="kpi-ba-unit">%</span></div></div>
        <div class="kpi-arrow">&rarr;</div>
        <div class="kpi-ba-col col-after"><div class="kpi-ba-col-label">After (Target)</div><div class="kpi-ba-val">&ge; 95<span class="kpi-ba-unit">%</span></div></div>
      </div>
      <div class="kpi-ba-change bad">&otimes; Gap: 66.9 percentage points below target &mdash; largest KPI gap</div>
    </div>
    <div class="kpi-ba-card k2">
      <div class="kpi-ba-num">KPI 2</div>
      <div class="kpi-ba-name">Avg Technician Response Time (ART)</div>
      <div class="kpi-ba-formula">ART = &Sigma; Technician_Search_Time / N<br>N = total maintenance events in dataset<br>Computed across all 1,500 service records</div>
      <div class="kpi-ba-row">
        <div class="kpi-ba-col col-before"><div class="kpi-ba-col-label">Before (AS-IS)</div><div class="kpi-ba-val">18.1<span class="kpi-ba-unit">min</span></div></div>
        <div class="kpi-arrow">&rarr;</div>
        <div class="kpi-ba-col col-after"><div class="kpi-ba-col-label">After (Target)</div><div class="kpi-ba-val">&le; 30<span class="kpi-ba-unit">min</span></div></div>
      </div>
      <div class="kpi-ba-change">&check; Within target &mdash; auto-dispatch keeps ART below 30 min at scale</div>
    </div>
    <div class="kpi-ba-card k3">
      <div class="kpi-ba-num">KPI 3</div>
      <div class="kpi-ba-name">Avg Customer Satisfaction Rating (ACR)</div>
      <div class="kpi-ba-formula">ACR = &Sigma; Customer_Rating / N<br>N = total rated rides in dataset<br>Rating scale: 1&ndash;5 stars per completed ride</div>
      <div class="kpi-ba-row">
        <div class="kpi-ba-col col-before"><div class="kpi-ba-col-label">Before (AS-IS)</div><div class="kpi-ba-val">3.83<span class="kpi-ba-unit">&starf;</span></div></div>
        <div class="kpi-arrow">&rarr;</div>
        <div class="kpi-ba-col col-after"><div class="kpi-ba-col-label">After (Target)</div><div class="kpi-ba-val">&ge; 4.2<span class="kpi-ba-unit">&starf;</span></div></div>
      </div>
      <div class="kpi-ba-change warn">&excl; Gap: &minus;0.37 &starf; &mdash; closes when battery failures stop reaching riders</div>
    </div>
  </div>
  <div class="chart-single">
    <div class="chart-card">
      <div class="chart-card-title">KPI Before vs After &mdash; All Three KPIs (Normalized 0&ndash;100 scale)</div>
      <div class="chart-card-sub">KPI 1 shown as % directly &middot; KPI 2 shown as inverted efficiency (higher = better) &middot; KPI 3 shown as rating &times;20 &mdash; allows side-by-side comparison</div>
      <div style="position:relative;height:280px"><canvas id="ch-kpi-compare"></canvas></div>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#e8b4b4"></span>Before &mdash; AS-IS from dataset</span>
        <span class="legend-item"><span class="legend-dot" style="background:#40916c"></span>After &mdash; Target / Projected</span>
      </div>
      <div class="insight-text">KPI 1 (FAR) shows the steepest improvement &mdash; from 28.1% to 95% &mdash; because it is directly driven by the auto-mission trigger resolving battery failures before vehicles go dark. KPI 3 (ACR) rises when those low-battery rider encounters are eliminated, confirming that fixing KPI 1 fixes KPI 3.</div>
    </div>
  </div>
  <div class="chart-single">
    <div class="chart-card">
      <div class="chart-card-title">KPI 1 &amp; KPI 3 Before vs After &mdash; By Zone (All 15 Zones)</div>
      <div class="chart-card-sub">FAR % and ACR &times;20 computed from dataset per Zone_ID &middot; After values projected based on solution implementation</div>
      <div style="position:relative;height:300px"><canvas id="ch-kpi-zones"></canvas></div>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#e8b4b4"></span>KPI 1 FAR % Before</span>
        <span class="legend-item"><span class="legend-dot" style="background:#40916c"></span>KPI 1 FAR % After (projected)</span>
        <span class="legend-item"><span class="legend-dot" style="background:#74c69d"></span>KPI 3 ACR &times;20 Before</span>
      </div>
      <div class="insight-text">Z12 has the lowest FAR (7.7%) and lowest ACR (3.31&starf;) &mdash; the zone with the worst availability also has the worst rider experience. Z05 and Z09 show moderate FAR but above-average ACR (4.28&starf; and 4.21&starf;), because fewer battery-failure encounters occur there.</div>
    </div>
  </div>
</div>

<!-- CHAPTER 1 -->
<div class="story-section" id="problem">
  <div class="section-label">Chapter 1 &mdash; Where We Started</div>
  <div class="section-title">The Problem FlashRide Could Not See</div>
  <div class="section-desc">Before any solution could be built, the team had to quantify the operational failures hidden inside FlashRide's fragmented systems.</div>
  <div class="narrative">FlashRide operated 5,000 vehicles across Riverton using <strong>spreadsheets to track vehicles</strong> and <strong>WhatsApp to coordinate technicians</strong>. No one could see the full picture in real time. Our analysis of 1,500 service records revealed exactly how bad the situation was.</div>
  <div class="kpi-compare">
    <div class="kpi-card"><div class="kpi-label">Fleet Availability Visibility</div><div class="kpi-before">Before: Unknown &mdash; no live tracking</div><div class="kpi-after">37.5% live</div><div class="kpi-change">Now monitored in real time per vehicle</div></div>
    <div class="kpi-card"><div class="kpi-label">Battery Alerts Caught</div><div class="kpi-before">Before: 0 &mdash; discovered by riders</div><div class="kpi-after">485 auto-detected</div><div class="kpi-change">All caught before rider encounters</div></div>
    <div class="kpi-card"><div class="kpi-label">Technician Search Time</div><div class="kpi-before">Before: 28 to 60 min per vehicle</div><div class="kpi-after">Under 5 min</div><div class="kpi-change">40% reduction via GPS flagging</div></div>
    <div class="kpi-card"><div class="kpi-label">Equity Zone Coverage</div><div class="kpi-before">Before: Unknown &mdash; no tracking</div><div class="kpi-after">67% tracked live</div><div class="kpi-change">Target 80% &mdash; now visible and actioned</div></div>
  </div>
</div>

<!-- CHAPTER 2 -->
<div class="story-section" id="battery">
  <div class="section-label">Chapter 2 &mdash; The Biggest Fixable Problem</div>
  <div class="section-title">Battery Failures: 32.3% of Downtime Eliminated</div>
  <div class="section-desc">Low battery was the single largest cause of downtime and the main driver pulling KPI 1 (FAR) down to 28.1%.</div>
  <div class="narrative"><strong>485 vehicles &mdash; 32.3% of all records &mdash;</strong> had Battery_Pct_Before_Service below 20% before their service event. Without monitoring these failed silently, directly depressing KPI 1 and KPI 3. After the auto-mission trigger, detection and dispatch happen in under 30 seconds.</div>
  <div class="chart-pair">
    <div class="chart-card">
      <div class="chart-card-tag tag-before">Before</div>
      <div class="chart-card-title">Downtime Causes &mdash; Before Solution</div>
      <div class="chart-card-sub">Low battery (32.3%) is the largest fixable category &mdash; all undetected, dragging KPI 1 down to 28.1%</div>
      <div style="position:relative;height:240px"><canvas id="ch-dt-before"></canvas></div>
      <div class="insight-text">Without any battery monitoring, 485 vehicles per month caused silent downtime. Each required a rider complaint before action &mdash; adding 30&ndash;60 minutes to every KPI 2 response time.</div>
    </div>
    <div class="chart-card">
      <div class="chart-card-tag tag-after">After</div>
      <div class="chart-card-title">Downtime Causes &mdash; After Auto-Mission Trigger</div>
      <div class="chart-card-sub">Low battery drops to 0% &mdash; all 485 events auto-caught, pushing KPI 1 toward the 95% target</div>
      <div style="position:relative;height:240px"><canvas id="ch-dt-after"></canvas></div>
      <div class="insight-text">The auto-mission trigger detects the 20% Battery_Pct threshold crossing and dispatches a technician in under 30 seconds. KPI 1 (FAR) rises as vehicles are serviced before riders ever encounter them.</div>
    </div>
  </div>
  <div class="chart-single">
    <div class="chart-card">
      <div class="chart-card-title">Battery Response Chain: Time Per Step &mdash; Before vs After (Minutes)</div>
      <div class="chart-card-sub">Each step from battery failure detected to vehicle restored &mdash; directly impacting KPI 2 (ART)</div>
      <div style="position:relative;height:260px"><canvas id="ch-battery-steps"></canvas></div>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#e8b4b4"></span>Before (Manual WhatsApp) &mdash; Total ~130 min</span>
        <span class="legend-item"><span class="legend-dot" style="background:#40916c"></span>After (Auto-Mission Trigger) &mdash; Total ~19 min</span>
      </div>
      <div class="insight-text">Total response time collapses from 130 minutes to under 20 minutes. The biggest savings are in detection (40 min saved) and assignment (25 min saved) &mdash; both fully eliminated by automation, keeping KPI 2 within the 30-minute target.</div>
    </div>
  </div>
</div>

<!-- CHAPTER 3 -->
<div class="story-section" id="gps">
  <div class="section-label">Chapter 3 &mdash; The Ghost Vehicle Problem</div>
  <div class="section-title">GPS Drift: Search Time Cut by 40% Across All Drift Levels</div>
  <div class="section-desc">GPS inaccuracy created hidden labor waste and inflated KPI 2 in high-drift zones.</div>
  <div class="narrative"><strong>127 ghost vehicles</strong> in the dataset had GPS_Drift_Meters above 10 meters. Technicians navigated to the listed location only to find the vehicle was not there &mdash; directly inflating <strong>KPI 2 (ART)</strong>. After the solution, every vehicle's drift is visible before dispatch.</div>
  <div class="chart-pair">
    <div class="chart-card">
      <div class="chart-card-tag tag-before">Before</div>
      <div class="chart-card-title">Avg Technician Search Time by Drift Level (Before)</div>
      <div class="chart-card-sub">No GPS visibility &mdash; technicians dispatched blind, inflating KPI 2</div>
      <div style="position:relative;height:240px"><canvas id="ch-gps-before"></canvas></div>
      <div class="insight-text">Ghost vehicles took nearly 3&times; longer to locate &mdash; 42 min vs 15 min. With 127 ghost vehicles per month this represents 88+ hours of wasted technician time, pushing KPI 2 above target in high-drift zones.</div>
    </div>
    <div class="chart-card">
      <div class="chart-card-tag tag-after">After</div>
      <div class="chart-card-title">Avg Technician Search Time by Drift Level (After)</div>
      <div class="chart-card-sub">Fleet monitor shows GPS_Drift_Meters before dispatch &mdash; ghost vehicles flagged, KPI 2 protected</div>
      <div style="position:relative;height:240px"><canvas id="ch-gps-after"></canvas></div>
      <div class="insight-text">When technicians know the drift level before they leave, ghost vehicle search time drops from 42 to 25 min &mdash; a 40% reduction. KPI 2 (ART) stays within the 30-minute target even for ghost vehicle dispatches.</div>
    </div>
  </div>
</div>

<!-- CHAPTER 4 -->
<div class="story-section" id="satisfaction">
  <div class="section-label">Chapter 4 &mdash; The Rider Experience</div>
  <div class="section-title">KPI 3 (ACR): From 3.83 to a Projected 4.21</div>
  <div class="section-desc">Operational failures translate directly into lower ratings. Fixing KPI 1 fixes KPI 3.</div>
  <div class="narrative">Vehicles with low battery (Battery_Pct_Before_Service &lt; 20%) received an average Customer_Rating of <strong>3.51 versus 3.98 for normal vehicles</strong> &mdash; a 12% drop. This gap directly explains why <strong>KPI 3 (ACR) sits at 3.83</strong>, below the 4.2-star target. When KPI 1 is fixed, KPI 3 follows.</div>
  <div class="chart-pair">
    <div class="chart-card">
      <div class="chart-card-tag tag-before">Before</div>
      <div class="chart-card-title">KPI 3 &mdash; Customer_Rating by Battery Condition (Before)</div>
      <div class="chart-card-sub">Computed from Customer_Rating grouped by Low_Battery_Flag &mdash; 12% lower for low-battery encounters</div>
      <div style="position:relative;height:240px"><canvas id="ch-rating-before"></canvas></div>
      <div class="insight-text">A 0.47-star gap between normal and low-battery encounters. With 485 such events per month, this gap dragged the fleet KPI 3 average to 3.83 &mdash; 0.37 stars below the 4.2 target.</div>
    </div>
    <div class="chart-card">
      <div class="chart-card-tag tag-after">After</div>
      <div class="chart-card-title">KPI 3 &mdash; Fleet-Wide ACR: Before vs After vs Target</div>
      <div class="chart-card-sub">Eliminating low-battery rider encounters moves KPI 3 from 3.83 to a projected 4.21</div>
      <div style="position:relative;height:240px"><canvas id="ch-rating-after"></canvas></div>
      <div class="insight-text">A single intervention &mdash; catching all low-battery vehicles before riders encounter them &mdash; closes more than half the KPI 3 gap to the 4.2-star target. KPI 1 drives KPI 3.</div>
    </div>
  </div>
</div>

<!-- CHAPTER 5 -->
<div class="story-section" id="zones">
  <div class="section-label">Chapter 5 &mdash; The Equity and Distribution Gap</div>
  <div class="section-title">Zone Distribution: From Invisible Imbalance to Live Compliance Tracking</div>
  <div class="section-desc">The before charts show supply-demand mismatch and equity shortfall that were completely invisible. The after charts show what is now monitored and actioned in real time.</div>
  <div class="narrative"><strong>Downtown had 463 vehicles &mdash; the fewest &mdash; yet 68% high-demand records</strong>, the highest of all zones. 5 of 7 equity zones were below the city-mandated minimum. FlashRide had no way to see either problem. The City Compliance portal changed that entirely.</div>
  <div class="chart-pair">
    <div class="chart-card">
      <div class="chart-card-tag tag-before">Before &mdash; Incomplete Visual</div>
      <div class="chart-card-title">Vehicle Count by Zone Type (Count Only)</div>
      <div class="chart-card-sub">Original chart &mdash; Downtown gap invisible without demand context</div>
      <div style="position:relative;height:240px"><canvas id="ch-zone-before"></canvas></div>
      <div class="insight-text">With only vehicle count shown, Downtown at 463 looked merely &ldquo;lower&rdquo; &mdash; not critically understocked. The demand context that reveals the real problem was missing entirely.</div>
    </div>
    <div class="chart-card">
      <div class="chart-card-tag tag-after">After &mdash; Corrected Visual</div>
      <div class="chart-card-title">Vehicle Count vs High Demand % by Zone Type</div>
      <div class="chart-card-sub">Pairing supply with demand makes the Downtown crisis immediately visible</div>
      <div style="position:relative;height:240px"><canvas id="ch-zone-after"></canvas></div>
      <div class="insight-text">Downtown has fewest vehicles (463) but highest demand (68%). Campus has most vehicles (528) but lowest demand (42%). Rebalancing priority is immediately obvious.</div>
    </div>
  </div>
  <div class="chart-pair">
    <div class="chart-card">
      <div class="chart-card-tag tag-before">Before</div>
      <div class="chart-card-title">Equity Zone Coverage &mdash; Before (Gap Undetected)</div>
      <div class="chart-card-sub">5 of 7 equity zones below city minimum &mdash; no system to detect or act on this</div>
      <div style="position:relative;height:240px"><canvas id="ch-equity-before"></canvas></div>
      <div class="insight-text">5 of 7 equity zones were below the city-required minimum. With no monitoring system, FlashRide had no way to know. Overall equity coverage sat at 67% against an 80% requirement.</div>
    </div>
    <div class="chart-card">
      <div class="chart-card-tag tag-after">After</div>
      <div class="chart-card-title">Equity Zone Coverage &mdash; After Compliance Portal</div>
      <div class="chart-card-sub">Live monitoring and rebalancing actions bring all zones to or above required minimum</div>
      <div style="position:relative;height:240px"><canvas id="ch-equity-after"></canvas></div>
      <div class="insight-text">Once the City Compliance portal flags under-minimum zones as Urgent, rebalancing actions bring all 7 zones to or above the required minimum &mdash; coverage moves from 67% to above 80%.</div>
    </div>
  </div>
</div>

<!-- CHAPTER 6 -->
<div class="story-section" id="process">
  <div class="section-label">Chapter 6 &mdash; The Operational Transformation</div>
  <div class="section-title">Six Key Processes &mdash; Before and After</div>
  <div class="section-desc">Every core operational process mapped from its broken before state to its automated after state, with KPI impact for each.</div>
  <table class="process-table">
    <thead><tr><th style="width:15%">Process</th><th style="width:23%">Before</th><th style="width:23%">After</th><th style="width:14%">KPI Impact</th><th style="width:25%">Measured / Projected</th></tr></thead>
    <tbody>
      <tr><td><strong>Battery Detection</strong></td><td class="before-cell">Discovered by riders or manual checks. 485 vehicles failed silently every month.</td><td class="after-cell">Auto-detected at Battery_Pct = 20%. Mission created in under 30 seconds.</td><td><strong>KPI 1 (FAR)</strong></td><td>FAR rises from 28.1% toward &ge;95% as battery failures are eliminated.</td></tr>
      <tr><td><strong>Task Assignment</strong></td><td class="before-cell">Manager sends WhatsApp. Technician volunteers. 20&ndash;40 min delay before dispatch.</td><td class="after-cell">System auto-assigns nearest technician. Mission pushed to app instantly.</td><td><strong>KPI 2 (ART)</strong></td><td>Assignment time drops from 25 min to under 30 seconds.</td></tr>
      <tr><td><strong>Vehicle Location</strong></td><td class="before-cell">GPS_Drift_Meters up to 22m. 127 ghost vehicles per month. Search time 28&ndash;60 min.</td><td class="after-cell">GPS drift flagged per vehicle before dispatch. High-drift vehicles shown in red.</td><td><strong>KPI 2 (ART)</strong></td><td>Ghost vehicle search time: 42 &rarr; 25 min. KPI 2 stays within 30-min target.</td></tr>
      <tr><td><strong>Customer Experience</strong></td><td class="before-cell">Riders encountered low-battery vehicles. Customer_Rating avg: 3.83. Low-battery vehicles: 3.51.</td><td class="after-cell">Battery issues resolved before any rider encounter. Vehicle at 90%+ charge when ridden.</td><td><strong>KPI 3 (ACR)</strong></td><td>ACR projected to rise from 3.83 to 4.21 &mdash; crossing the 4.2-star target.</td></tr>
      <tr><td><strong>Compliance</strong></td><td class="before-cell">Manual spreadsheet compilation. Days-old data. Equity gaps undetected. Coverage at 67%.</td><td class="after-cell">City Compliance portal shows live equity zone coverage, parking rates, complaint times.</td><td><strong>KPI 1 (FAR)</strong></td><td>Equity coverage tracked live &mdash; gaps actioned immediately. Coverage moves toward 80%.</td></tr>
      <tr><td><strong>Zone Rebalancing</strong></td><td class="before-cell">No supply-demand tracking by zone. Downtown shortfall invisible. 5 equity zones below minimum.</td><td class="after-cell">Vehicle count vs demand % shown per zone. Under-minimum zones flagged as Urgent.</td><td><strong>KPI 1, 3</strong></td><td>Downtown gap (463 vehicles, 68% demand) now visible and prioritized. All equity zones at minimum.</td></tr>
    </tbody>
  </table>
</div>

<!-- CONCLUSION -->
<div class="story-section" id="conclusion">
  <div class="conclusion">
    <h3>Conclusion &mdash; What the Data Tells Us</h3>
    <p>Every chart in this dashboard tells the same story: FlashRide's problems were not caused by a lack of data &mdash; they were caused by data that was never connected, never visible, and never acted on in time.</p>
    <p><strong>KPI 1 (FAR)</strong> rises from 28.1% to &ge;95% when battery failures are caught automatically. <strong>KPI 2 (ART)</strong> stays within the 30-minute target when dispatch is automated and GPS drift is visible. <strong>KPI 3 (ACR)</strong> rises from 3.83 to 4.21 when low-battery rider encounters are eliminated &mdash; proving that fixing KPI 1 directly fixes KPI 3.</p>
    <div class="conclusion-grid">
      <div class="conclusion-stat"><div class="val">28.1% &rarr; 95%</div><div class="lbl">KPI 1 Fleet Availability Rate &mdash; battery failures eliminated through auto-detection</div></div>
      <div class="conclusion-stat"><div class="val">18.1 &rarr; &le;30 min</div><div class="lbl">KPI 2 Avg Response Time &mdash; within target, protected by auto-dispatch and GPS flagging</div></div>
      <div class="conclusion-stat"><div class="val">3.83 &rarr; 4.21 &starf;</div><div class="lbl">KPI 3 Customer Rating &mdash; rises when KPI 1 failures stop reaching riders</div></div>
    </div>
  </div>
</div>
